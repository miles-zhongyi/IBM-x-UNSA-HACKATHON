# Optional one-command API demo (Linux/macOS/WSL with Docker).
# From repo root: docker compose up --build
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - EMBEDDING_BACKEND=hashed
    command: >
      bash -c "pip install -q -r backend/requirements.txt
      && uvicorn backend.api.main:app --host 0.0.0.0 --port 8000"
